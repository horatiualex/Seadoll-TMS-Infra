services:
  ssh-tunnel:
    build:
      context: ./ssh-tunnel
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      SSH_HOST: ${SSH_HOST}
      SSH_PASSWORD: ${SSH_PASSWORD}
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3306"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../Seadoll-TMS-BE
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: "Server=ssh-tunnel;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD};"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "5001:5000"
    depends_on:
      ssh-tunnel:
        condition: service_healthy

  web:
    build:
      context: ../Seadoll-TMS-FE
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
