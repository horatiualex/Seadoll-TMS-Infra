events {
    worker_connections 1024;
}

http {
    # Rate limiting: max 5 incercari de login, dupa blocat ~5 minute
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=1r/m;

    upstream api {
        server api:5000;
    }

    upstream web {
        server web:3000;
    }

    server {
        listen 80;
        server_name _;

        # Login - rate limited: 5 incercari, dupa blocat ~5 minute
        location = /api/auth/login {
            limit_req zone=login_zone burst=4 nodelay;
            limit_req_status 429;
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API requests
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
