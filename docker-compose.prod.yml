services:
  api:
    build:
      context: ../Seadoll-TMS-BE
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: "Server=172.17.0.1;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD};"
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__Key: ${JWT_KEY}
      Cors__AllowedOrigins__0: "http://${VPS_IP}"
      Cors__AllowedOrigins__1: "http://${VPS_IP}:80"
    volumes:
      - uploads:/app/uploads
    ports:
      - "5000:5000"

  web:
    build:
      context: ../Seadoll-TMS-FE
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  uploads:
